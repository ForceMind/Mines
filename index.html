<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Mines</title>
<style>
  :root {
    --bg: #0b2a4a;
    --panel: #163a63;
    --panel-2: #1e4b78;
    --line: rgba(190,225,255,.18);
    --text: #f7fafc;
    --muted: #9aa8bb;
    --accent: #37c6a1;
    --accent-2: #62e0bd;
    --gold: #ffd45f;
    --cell: #24527d;
    --cell-hover: #326da3;
    --safe: #18b97c;
    --mine: #8f2d36;
    --ink: #111827;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background:
      radial-gradient(circle at 18% 8%, rgba(57,154,255,.34), transparent 34%),
      radial-gradient(circle at 82% 20%, rgba(55,198,255,.2), transparent 30%),
      linear-gradient(135deg, #09233f, #123b67 52%, #0b2f54);
    color: var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    padding: 18px;
  }

  .shell {
    width: min(96vmin, 760px);
    height: min(96vmin, 760px);
    aspect-ratio: 1 / 1;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr) auto auto;
    overflow: hidden;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(20,54,91,.96);
    box-shadow: 0 28px 70px rgba(0,18,38,.38);
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 18px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
    background: rgba(117,181,255,.08);
  }

  h1 {
    margin: 0 0 4px;
    font-size: 22px;
    line-height: 1.1;
    font-weight: 760;
  }

  .subtle {
    margin: 0;
    color: var(--muted);
    font-size: 12px;
  }

  .balance {
    text-align: right;
    min-width: 150px;
  }

  .header-stats {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
    max-width: 320px;
  }

  .stat {
    min-height: 42px;
    padding: 7px 9px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: rgba(143,198,255,.09);
  }

  .stat span {
    display: block;
    color: var(--muted);
    font-size: 10px;
  }

  .stat strong {
    display: block;
    margin-top: 3px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 14px;
  }

  .balance strong {
    display: block;
    margin-top: 2px;
    font-size: 22px;
    color: var(--gold);
  }

  .board-area {
    min-width: 0;
    min-height: 0;
    display: grid;
    place-items: center;
    padding: 12px 18px;
  }

  .board {
    width: min(100%, 410px);
    aspect-ratio: 1 / 1;
    display: grid;
    gap: 6px;
    padding: 8px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: linear-gradient(180deg, #12375e, #0d2a49);
  }

  button {
    border: 1px solid transparent;
    border-radius: 6px;
    color: #06130f;
    background: linear-gradient(180deg, var(--accent-2), var(--accent));
    font: inherit;
    font-weight: 760;
    cursor: pointer;
    transition: transform .12s ease, filter .12s ease, opacity .12s ease;
  }

  button:hover { transform: translateY(-1px); }
  button:active { transform: translateY(0); filter: brightness(.96); }
  button:disabled { cursor: not-allowed; opacity: .55; transform: none; }

  .cell {
    width: 100%;
    height: 100%;
    min-width: 0;
    min-height: 0;
    display: grid;
    place-items: center;
    padding: 0;
    border: 1px solid rgba(255,255,255,.14);
    border-radius: 6px;
    background: linear-gradient(180deg, var(--cell-hover), var(--cell));
    box-shadow: inset 0 1px 0 rgba(255,255,255,.14), 0 5px 12px rgba(0,25,55,.22);
    color: var(--text);
    font-size: clamp(18px, 4.4vmin, 30px);
    line-height: 1;
    user-select: none;
  }

  .cell.open {
    cursor: default;
    background: radial-gradient(circle at 50% 35%, #9fffea 0%, #38e8b9 38%, var(--safe) 100%);
    border-color: rgba(183,255,238,.9);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.42), 0 0 22px rgba(77,255,216,.62);
    text-shadow: 0 0 10px rgba(255,255,255,.95), 0 0 18px rgba(65,242,255,.9);
  }

  .cell.mine {
    cursor: default;
    background: linear-gradient(180deg, #b33b42, var(--mine));
    border-color: rgba(255,255,255,.32);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.2), 0 0 16px rgba(239,87,87,.22);
  }

  .controls {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 172px 154px;
    gap: 10px;
    align-items: end;
    padding: 10px 18px 12px;
    border-top: 1px solid var(--line);
    background: rgba(8,39,72,.54);
  }

  label {
    display: block;
    margin-bottom: 6px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 650;
  }

  input,
  select {
    width: 100%;
    height: 38px;
    border: 1px solid rgba(255,255,255,.16);
    border-radius: 6px;
    padding: 0 10px;
    outline: none;
    background: #f7fafc;
    color: var(--ink);
    font: inherit;
  }

  .bet-stepper {
    display: grid;
    grid-template-columns: 36px minmax(0, 1fr) 36px;
    gap: 6px;
  }

  .step-btn,
  .mine-display,
  .bet-display {
    height: 38px;
    border-radius: 6px;
  }

  .step-btn {
    color: var(--text);
    border-color: rgba(255,255,255,.16);
    background: var(--panel-2);
    font-size: 18px;
  }

  .mine-display,
  .bet-display {
    display: grid;
    place-items: center;
    min-width: 0;
    padding: 0 8px;
    border: 1px solid rgba(255,255,255,.16);
    background: #f7fafc;
    color: var(--ink);
    font-size: 15px;
    font-weight: 760;
  }

  .action {
    width: 100%;
    height: 38px;
    white-space: nowrap;
  }

  footer {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    border-top: 1px solid var(--line);
    background: rgba(8,39,72,.64);
  }

  .log {
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--muted);
    font-size: 12px;
  }

  .modal {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: none;
    place-items: center;
    padding: 20px;
    background: rgba(5, 22, 42, .66);
  }

  .modal.show { display: grid; }

  .modal-panel {
    width: min(340px, 100%);
    padding: 22px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: linear-gradient(180deg, #1e4b78, #12375e);
    box-shadow: 0 28px 70px rgba(0,0,0,.45);
    text-align: center;
  }

  .modal-icon {
    margin-bottom: 10px;
    font-size: 42px;
    line-height: 1;
  }

  .modal-title {
    margin: 0;
    font-size: 24px;
    line-height: 1.15;
  }

  .modal-message {
    margin: 8px 0 18px;
    color: var(--muted);
    font-size: 14px;
  }

  .modal-button {
    width: 100%;
    height: 40px;
  }

  @media (max-width: 720px) {
    body { padding: 10px; }
    .shell {
      width: min(96vmin, 620px);
      height: min(96vmin, 620px);
    }
    header {
      align-items: start;
      padding: 10px 14px;
    }
    .header-stats { display: none; }
    .board-area { padding: 10px 12px; }
    .board {
      width: min(100%, 360px);
      gap: 4px;
      padding: 6px;
    }
    .controls {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 10px 12px;
    }
    .action-wrap { grid-column: 1 / -1; }
  }
</style>
</head>
<body>
<div class="shell">
  <header>
    <div>
      <h1>Mines</h1>
      <p class="subtle">Live game</p>
    </div>
    <div class="header-stats">
      <div class="stat">
        <span>Safe</span>
        <strong id="safeClicks">0</strong>
      </div>
      <div class="stat">
        <span>Next</span>
        <strong id="nextSafe">--</strong>
      </div>
      <div class="stat">
        <span>Cashout</span>
        <strong id="cashoutValue">--</strong>
      </div>
    </div>
    <div class="balance">
      <p class="subtle">Coins</p>
      <strong id="balance">1000.00</strong>
    </div>
  </header>

  <section class="board-area">
    <div id="board" class="board"></div>
  </section>

  <section class="controls">
    <!-- Board size switch is disabled for now. Restore this block and the matching JS listener to re-enable board switching.
    <div class="field">
      <label for="boardSize">Board</label>
      <select id="boardSize">
        <option value="4">4 x 4</option>
        <option value="5" selected>5 x 5</option>
        <option value="6">6 x 6</option>
        <option value="8">8 x 8</option>
      </select>
    </div>
    -->

    <div class="field">
      <label>Mines</label>
      <div class="bet-stepper">
        <button id="mineMinus" class="step-btn" type="button" aria-label="Decrease mines">-</button>
        <div id="mineDisplay" class="mine-display">5</div>
        <button id="minePlus" class="step-btn" type="button" aria-label="Increase mines">+</button>
      </div>
    </div>

    <div class="field">
      <label>Bet</label>
      <div class="bet-stepper">
        <button id="betMinus" class="step-btn" type="button" aria-label="Decrease bet">-</button>
        <div id="betDisplay" class="bet-display">10</div>
        <button id="betPlus" class="step-btn" type="button" aria-label="Increase bet">+</button>
      </div>
    </div>

    <div class="action-wrap">
      <button id="actionBtn" class="action">Start Round</button>
    </div>
  </section>

  <footer>
    <div id="log" class="log">Ready.</div>
  </footer>
</div>

<div id="resultModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal-panel">
    <div id="modalIcon" class="modal-icon">💎</div>
    <h2 id="modalTitle" class="modal-title">Congratulations</h2>
    <p id="modalMessage" class="modal-message">You won 0.00 coins.</p>
    <button id="modalButton" class="modal-button" type="button">Continue</button>
  </div>
</div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const boardEl = $('board');
  const mineMinusBtn = $('mineMinus');
  const minePlusBtn = $('minePlus');
  const mineDisplayEl = $('mineDisplay');
  const betMinusBtn = $('betMinus');
  const betPlusBtn = $('betPlus');
  const betDisplayEl = $('betDisplay');
  const actionBtn = $('actionBtn');
  const balanceEl = $('balance');
  const safeClicksEl = $('safeClicks');
  const nextSafeEl = $('nextSafe');
  const cashoutValueEl = $('cashoutValue');
  const logEl = $('log');
  const resultModalEl = $('resultModal');
  const modalIconEl = $('modalIcon');
  const modalTitleEl = $('modalTitle');
  const modalMessageEl = $('modalMessage');
  const modalButtonEl = $('modalButton');

  let currentGame = null;
  let currentUser = null;
  let betLevels = [1, 5, 10, 20, 50, 100];
  let betIndex = 2;
  let mineCount = 5;
  let playerId = localStorage.getItem('minesPlayerId');
  if (!playerId) {
    playerId = `player-${Math.random().toString(36).slice(2, 10)}${Date.now().toString(36).slice(-4)}`;
    localStorage.setItem('minesPlayerId', playerId);
  }

  const FIXED_BOARD_SIZE = 5;
  const MIN_MINES = 1;
  const MAX_MINES = FIXED_BOARD_SIZE * FIXED_BOARD_SIZE - 1;
  // Future board size switch: restore the commented Board select in the HTML and set FIXED_BOARD_SIZE from that control.
  const terminalStatuses = new Set(['lost', 'won', 'cashed_out', 'abandoned']);

  function coins(value) {
    return `${Number(value || 0).toFixed(2)}`;
  }

  function betMoney(value) {
    const number = Number(value || 0);
    return Number.isInteger(number) ? `${number}` : coins(number);
  }

  function percent(value) {
    return `${(Number(value || 0) * 100).toFixed(2)}%`;
  }

  function setLog(message) {
    logEl.textContent = message;
  }

  function currentBet() {
    return betLevels[betIndex] || betLevels[0] || 1;
  }

  function syncBetDisplay() {
    betDisplayEl.textContent = betMoney(currentBet());
    betMinusBtn.disabled = currentGame?.status === 'active' || betIndex <= 0;
    betPlusBtn.disabled = currentGame?.status === 'active' || betIndex >= betLevels.length - 1;
  }

  function syncMineDisplay() {
    mineCount = Math.max(MIN_MINES, Math.min(MAX_MINES, mineCount));
    mineDisplayEl.textContent = `${mineCount}`;
    mineMinusBtn.disabled = currentGame?.status === 'active' || mineCount <= MIN_MINES;
    minePlusBtn.disabled = currentGame?.status === 'active' || mineCount >= MAX_MINES;
  }

  function applyBetLevels(levels) {
    const previousBet = currentBet();
    const normalized = Array.isArray(levels)
      ? levels.map(Number).filter((value) => Number.isFinite(value) && value > 0).sort((a, b) => a - b)
      : [];
    betLevels = normalized.length ? normalized : [1, 5, 10, 20, 50, 100];
    betIndex = betLevels.reduce((bestIndex, level, index) => (
      Math.abs(level - previousBet) < Math.abs(betLevels[bestIndex] - previousBet) ? index : bestIndex
    ), 0);
    syncBetDisplay();
  }

  function showResultModal(type, amount = 0) {
    if (type === 'loss') {
      modalIconEl.textContent = '💣';
      modalTitleEl.textContent = 'Round Lost';
      modalMessageEl.textContent = 'You hit a mine.';
    } else {
      modalIconEl.textContent = '💎';
      modalTitleEl.textContent = 'Congratulations';
      modalMessageEl.textContent = `You won ${coins(amount)} coins.`;
    }
    resultModalEl.classList.add('show');
  }

  function hideResultModal() {
    resultModalEl.classList.remove('show');
  }

  async function api(path, options = {}) {
    const response = await fetch(path, {
      headers: { 'content-type': 'application/json' },
      ...options,
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || 'Request failed');
    return data;
  }

  function buildBoard(size) {
    boardEl.innerHTML = '';
    boardEl.style.gridTemplateColumns = `repeat(${size}, minmax(0, 1fr))`;
    boardEl.style.gridTemplateRows = `repeat(${size}, minmax(0, 1fr))`;
    for (let i = 0; i < size * size; i += 1) {
      const cell = document.createElement('button');
      cell.type = 'button';
      cell.className = 'cell';
      cell.dataset.index = i;
      cell.setAttribute('aria-label', `Cell ${i + 1}`);
      cell.addEventListener('click', () => revealCell(i));
      boardEl.appendChild(cell);
    }
  }

  function updateActionState(active) {
    if (active) {
      actionBtn.textContent = 'Cash Out';
      actionBtn.disabled = !currentGame || currentGame.safeClicks <= 0 || currentGame.cashout.current <= 0;
      return;
    }

    actionBtn.disabled = false;
    actionBtn.textContent = currentGame && terminalStatuses.has(currentGame.status) ? 'Next Round' : 'Start Round';
  }

  function render() {
    const size = currentGame?.size || FIXED_BOARD_SIZE;
    if (boardEl.children.length !== size * size) buildBoard(size);

    const revealed = new Set(currentGame?.revealed || []);
    const mines = new Set(currentGame?.mineIndexes || []);
    const active = currentGame?.status === 'active';

    Array.from(boardEl.children).forEach((cell, index) => {
      cell.disabled = !active || revealed.has(index) || mines.has(index);
      cell.textContent = '';
      cell.classList.remove('open', 'mine');

      if (revealed.has(index)) {
        cell.classList.add('open');
        cell.textContent = '💎';
      }
      if (mines.has(index)) {
        cell.classList.add('mine');
        cell.textContent = '💣';
      }
    });

    syncMineDisplay();
    syncBetDisplay();

    safeClicksEl.textContent = currentGame?.safeClicks || 0;
    nextSafeEl.textContent = active ? percent(currentGame.nextSafeProbability) : '--';
    cashoutValueEl.textContent = active && currentGame.safeClicks > 0 ? coins(currentGame.cashout.current) : '--';
    balanceEl.textContent = coins(currentUser?.balance || 0);
    updateActionState(active);
  }

  async function refresh() {
    const data = await api(`/api/state?userId=${encodeURIComponent(playerId)}`);
    currentUser = data.user;
    currentGame = data.game;
    applyBetLevels(data.config?.betLevels);
    if (!currentGame) buildBoard(FIXED_BOARD_SIZE);
    render();
  }

  async function startRound() {
    try {
      const data = await api('/api/game/start', {
        method: 'POST',
        body: JSON.stringify({
          userId: playerId,
          size: FIXED_BOARD_SIZE,
          mines: mineCount,
          bet: currentBet(),
        }),
      });
      currentUser = data.user;
      currentGame = data.game;
      setLog(`Round started: ${currentGame.size} x ${currentGame.size}, ${currentGame.mines} mines.`);
      render();
    } catch (error) {
      setLog(error.message);
    }
  }

  async function revealCell(index) {
    if (!currentGame || currentGame.status !== 'active') return;
    try {
      const data = await api('/api/game/reveal', {
        method: 'POST',
        body: JSON.stringify({ gameId: currentGame.id, index }),
      });
      currentUser = data.user;
      currentGame = data.game;
      if (data.result === 'mine') {
        setLog('Mine hit. Press Next Round.');
        showResultModal('loss');
      }
      if (data.result === 'safe') setLog('Safe cell opened.');
      if (data.result === 'win') {
        setLog(`Board cleared. Paid ${coins(data.payout.current)} coins.`);
        showResultModal('win', data.payout.current);
      }
      render();
    } catch (error) {
      setLog(error.message);
    }
  }

  async function cashout() {
    if (!currentGame || currentGame.status !== 'active') return;
    try {
      const data = await api('/api/game/cashout', {
        method: 'POST',
        body: JSON.stringify({ gameId: currentGame.id }),
      });
      currentUser = data.user;
      currentGame = data.game;
      const capText = data.payout.capped ? ' Payout cap applied.' : '';
      setLog(`Cashed out ${coins(data.payout.current)} coins.${capText}`);
      showResultModal('win', data.payout.current);
      render();
    } catch (error) {
      setLog(error.message);
    }
  }

  async function handleAction() {
    if (currentGame?.status === 'active') {
      await cashout();
      return;
    }
    await startRound();
  }

  // Future board size switch listener goes here when board switching is restored.

  actionBtn.addEventListener('click', handleAction);
  mineMinusBtn.addEventListener('click', () => {
    if (currentGame?.status === 'active') return;
    mineCount -= 1;
    syncMineDisplay();
  });
  minePlusBtn.addEventListener('click', () => {
    if (currentGame?.status === 'active') return;
    mineCount += 1;
    syncMineDisplay();
  });
  betMinusBtn.addEventListener('click', () => {
    if (currentGame?.status === 'active') return;
    betIndex = Math.max(0, betIndex - 1);
    syncBetDisplay();
  });
  betPlusBtn.addEventListener('click', () => {
    if (currentGame?.status === 'active') return;
    betIndex = Math.min(betLevels.length - 1, betIndex + 1);
    syncBetDisplay();
  });
  modalButtonEl.addEventListener('click', hideResultModal);
  resultModalEl.addEventListener('click', (event) => {
    if (event.target === resultModalEl) hideResultModal();
  });
  syncMineDisplay();
  buildBoard(FIXED_BOARD_SIZE);
  refresh().catch((error) => setLog(error.message));
})();
</script>
</body>
</html>
