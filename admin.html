<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mines 后台管理</title>
<style>
  :root {
    --bg: #10151f;
    --panel: #17202d;
    --panel-2: #1f2b3b;
    --line: rgba(255,255,255,.1);
    --text: #f7fafc;
    --muted: #9aa8bb;
    --accent: #37c6a1;
    --danger: #ef5757;
    --gold: #f3c95b;
    --ink: #111827;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f1722, #151b24 52%, #111827);
    color: var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .page {
    width: min(1180px, calc(100% - 32px));
    margin: 0 auto;
    padding: 24px 0 40px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: end;
    gap: 16px;
    margin-bottom: 18px;
  }

  h1,
  h2 {
    margin: 0;
    line-height: 1.1;
  }

  h1 { font-size: 28px; }
  h2 { font-size: 16px; }

  a { color: #62e0bd; text-decoration: none; }

  .muted {
    margin: 6px 0 0;
    color: var(--muted);
    font-size: 13px;
  }

  .grid {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 16px;
  }

  .card {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(23,32,45,.96);
    box-shadow: 0 18px 50px rgba(0,0,0,.24);
  }

  .card-head {
    padding: 14px 16px;
    border-bottom: 1px solid var(--line);
    background: rgba(255,255,255,.025);
  }

  .card-body { padding: 16px; }

  label {
    display: block;
    margin: 0 0 6px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 650;
  }

  input {
    width: 100%;
    height: 38px;
    margin-bottom: 12px;
    border: 1px solid rgba(255,255,255,.16);
    border-radius: 6px;
    padding: 0 10px;
    outline: none;
    background: #f7fafc;
    color: var(--ink);
    font: inherit;
  }

  button {
    height: 38px;
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 0 14px;
    color: #06130f;
    background: linear-gradient(180deg, #62e0bd, var(--accent));
    font: inherit;
    font-weight: 760;
    cursor: pointer;
  }

  .full { width: 100%; }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }

  .stat {
    min-height: 78px;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255,255,255,.035);
  }

  .stat span {
    display: block;
    color: var(--muted);
    font-size: 12px;
  }

  .stat strong {
    display: block;
    margin-top: 8px;
    font-size: 20px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th,
  td {
    padding: 10px 8px;
    border-bottom: 1px solid var(--line);
    text-align: left;
    vertical-align: top;
  }

  th {
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    height: 22px;
    padding: 0 8px;
    border-radius: 999px;
    background: rgba(255,255,255,.08);
    color: var(--text);
    font-size: 12px;
  }

  .pill.live { background: rgba(55,198,161,.18); color: #62e0bd; }
  .pill.lost { background: rgba(239,87,87,.18); color: #ff9b9b; }
  .pill.win { background: rgba(243,201,91,.18); color: var(--gold); }

  .note {
    min-height: 20px;
    margin-top: 10px;
    color: var(--muted);
    font-size: 12px;
  }

  @media (max-width: 860px) {
    .grid { grid-template-columns: 1fr; }
    .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    header { align-items: start; flex-direction: column; }
  }
</style>
</head>
<body>
<div class="page">
  <header>
    <div>
      <h1>Mines 后台管理</h1>
      <p class="muted">运行参数、玩家 RTP、派彩封顶和保护触发记录。</p>
    </div>
    <a href="/">打开游戏</a>
  </header>

  <div class="grid">
    <aside class="card">
      <div class="card-head">
        <h2>保护配置</h2>
      </div>
      <div class="card-body" id="configForm">
        <label for="houseEdge">平台优势</label>
        <input id="houseEdge" type="number" min="0" max="0.25" step="0.01">

        <label for="protectionFloorRtp">保护触发 RTP 下限</label>
        <input id="protectionFloorRtp" type="number" min="0" max="1" step="0.01">

        <label for="protectionMaxRtp">用户 RTP 上限</label>
        <input id="protectionMaxRtp" type="number" min="0.5" max="1" step="0.01">

        <label for="baseProtectionDeviation">基础保护偏离值</label>
        <input id="baseProtectionDeviation" type="number" min="0" max="1" step="0.01">

        <label for="maxProtectionDeviation">最大保护偏离值</label>
        <input id="maxProtectionDeviation" type="number" min="0" max="1" step="0.01">

        <label for="maxProtectionMoves">单局最大保护次数</label>
        <input id="maxProtectionMoves" type="number" min="0" max="10" step="1">

        <label for="betLevels">下注档位，英文逗号分隔</label>
        <input id="betLevels" type="text" placeholder="1,5,10,20,50,100">

        <button id="saveBtn" class="full">保存配置</button>
        <p id="saveNote" class="note"></p>
      </div>
    </aside>

    <main>
      <section class="stats" id="stats"></section>

      <section class="card">
        <div class="card-head">
          <h2>玩家列表</h2>
        </div>
        <div class="card-body">
          <table>
            <thead>
              <tr>
                <th>玩家</th>
                <th>余额</th>
                <th>下注总额</th>
                <th>派彩总额</th>
                <th>RTP</th>
                <th>保护</th>
              </tr>
            </thead>
            <tbody id="usersBody"></tbody>
          </table>
        </div>
      </section>

      <section class="card" style="margin-top:16px">
        <div class="card-head">
          <h2>最近局记录</h2>
        </div>
        <div class="card-body">
          <table>
            <thead>
              <tr>
                <th>局号</th>
                <th>玩家</th>
                <th>状态</th>
                <th>下注</th>
                <th>安全格</th>
                <th>可提现</th>
                <th>保护</th>
              </tr>
            </thead>
            <tbody id="gamesBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
</div>

<script>
(() => {
  const ids = [
    'configForm', 'saveBtn', 'saveNote',
    'stats', 'usersBody', 'gamesBody', 'houseEdge', 'protectionFloorRtp',
    'protectionMaxRtp', 'baseProtectionDeviation', 'maxProtectionDeviation',
    'maxProtectionMoves', 'betLevels'
  ];
  const el = Object.fromEntries(ids.map((id) => [id, document.getElementById(id)]));
  const configKeys = [
    'houseEdge',
    'protectionFloorRtp',
    'protectionMaxRtp',
    'baseProtectionDeviation',
    'maxProtectionDeviation',
    'maxProtectionMoves',
  ];

  function money(value) {
    return `${Number(value || 0).toFixed(2)} 金币`;
  }

  function pct(value) {
    return `${Number(value || 0).toFixed(2)}%`;
  }

  async function adminApi(path, options = {}) {
    const response = await fetch(path, {
      headers: {
        'content-type': 'application/json',
      },
      ...options,
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || 'Request failed');
    return data;
  }

  function statusClass(status) {
    if (status === 'active') return 'live';
    if (status === 'lost' || status === 'abandoned') return 'lost';
    return 'win';
  }

  function statusText(status) {
    return {
      active: '进行中',
      lost: '已失败',
      won: '已全开',
      cashed_out: '已提现',
      abandoned: '已结束',
    }[status] || status;
  }

  function renderConfig(config) {
    configKeys.forEach((key) => {
      el[key].value = config[key];
    });
    el.betLevels.value = (config.betLevels || []).join(',');
  }

  function renderStats(totals) {
    el.stats.innerHTML = [
      ['总余额', money(totals.balance)],
      ['总下注', money(totals.totalWagered)],
      ['总派彩', money(totals.totalPaidOut)],
      ['系统 RTP', pct(totals.rtpPercent)],
    ].map(([label, value]) => `
      <div class="stat">
        <span>${label}</span>
        <strong>${value}</strong>
      </div>
    `).join('');
  }

  function renderUsers(users) {
    el.usersBody.innerHTML = users.map((user) => `
      <tr>
        <td>${user.id}</td>
        <td>${money(user.balance)}</td>
        <td>${money(user.totalWagered)}</td>
        <td>${money(user.totalPaidOut)}</td>
        <td>${pct(user.rtpPercent)}</td>
        <td>${user.protectedMoves} 次</td>
      </tr>
    `).join('') || '<tr><td colspan="6">暂无玩家数据。前台有玩家打开游戏后会自动创建记录。</td></tr>';
  }

  function renderGames(games) {
    el.gamesBody.innerHTML = games.map((game) => {
      const protection = game.protection || {};
      const events = protection.events || [];
      const protectionText = protection.active
        ? `${protection.movesUsed}/${protection.movesUsed + protection.movesRemaining} 次，偏离 ${Number(protection.deviation || 0).toFixed(2)}`
        : '未启用';
      const eventText = events.length ? `（${events.length} 次改为安全）` : '';
      return `
        <tr>
          <td title="${game.id}">${game.id.slice(0, 8)}</td>
          <td>${game.userId}</td>
          <td><span class="pill ${statusClass(game.status)}">${statusText(game.status)}</span></td>
          <td>${money(game.bet)}</td>
          <td>${game.safeClicks}/${game.size * game.size - game.mines}</td>
          <td>${money(game.cashout.current)}${game.cashout.capped ? ' 已封顶' : ''}</td>
          <td>${protectionText}${eventText}</td>
        </tr>
      `;
    }).join('') || '<tr><td colspan="7">暂无局记录。玩家开始游戏后会显示最近对局。</td></tr>';
  }

  async function loadDashboard() {
    try {
      const data = await adminApi('/api/admin/summary');
      renderConfig(data.config);
      renderStats(data.totals);
      renderUsers(data.users);
      renderGames(data.games);
    } catch (error) {
      el.saveNote.textContent = error.message;
    }
  }

  async function saveConfig() {
    const payload = {};
    configKeys.forEach((key) => {
      payload[key] = key === 'maxProtectionMoves' ? parseInt(el[key].value, 10) : Number(el[key].value);
    });
    payload.betLevels = el.betLevels.value
      .split(',')
      .map((item) => Number(item.trim()))
      .filter((item) => Number.isFinite(item) && item > 0);

    try {
      const data = await adminApi('/api/admin/config', {
        method: 'POST',
        body: JSON.stringify(payload),
      });
      renderConfig(data.config);
      el.saveNote.textContent = '配置已保存。';
      await loadDashboard();
    } catch (error) {
      el.saveNote.textContent = error.message;
    }
  }

  el.saveBtn.addEventListener('click', saveConfig);
  loadDashboard();
})();
</script>
</body>
</html>
